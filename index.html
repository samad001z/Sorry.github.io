<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6f0,#ffc2d1);
overflow:hidden;
padding:15px;
}

/* floating card */

.card{

width:100%;
max-width:340px;

padding:30px;

text-align:center;

background:rgba(255,255,255,0.25);

backdrop-filter:blur(18px);

border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.15);

}

/* title */

h1{
font-size:28px;
color:white;
margin-bottom:10px;
}

p{
color:white;
font-size:16px;
margin-bottom:25px;
min-height:60px;
}

/* buttons */

.buttons{
position:relative;
height:80px;
}

button{

padding:12px 22px;

border:none;

border-radius:12px;

font-size:16px;

cursor:pointer;

transition:0.3s;

}

#yes{

background:#ff3d8b;

color:white;

position:absolute;

left:10%;

}

#no{

background:white;

position:absolute;

right:10%;

}

/* celebration */

.celebration{

display:none;

font-size:22px;

color:white;

margin-top:20px;

}

/* hearts */

.heart{

position:absolute;

font-size:22px;

animation:rise 6s linear infinite;

}

@keyframes rise{

from{transform:translateY(0)}

to{transform:translateY(-120vh)}

}

/* floating bubbles */

.bubble{

position:absolute;

bottom:-100px;

border-radius:50%;

background:rgba(255,255,255,0.25);

animation:float 15s infinite;

}

@keyframes float{

0%{transform:translateY(0)}

100%{transform:translateY(-120vh)}

}

</style>
</head>

<body>

<div class="card">

<h1>I'm Sorry 🥺</h1>

<p id="message">
I know I messed up... please forgive me?
</p>

<div class="buttons">

<button id="yes">Forgive 💗</button>
<button id="no">No 😤</button>

</div>

<div class="celebration" id="celebrate">
Yayyy!! Thank you for forgiving me 💕
</div>

</div>

<script>

const msgs = [

"I know I messed up... please forgive me 🥺",

"I promise I will do better ❤️",

"You are too important to lose 💔",

"Please don't stay mad at me 😭",

"Can we smile again? 😊",

"Pretty please forgive me 💕"

]

let i=0

const message=document.getElementById("message")

const no=document.getElementById("no")

const yes=document.getElementById("yes")

const celebrate=document.getElementById("celebrate")

/* move no button */

function moveNo(){

const x=Math.random()*200-100

const y=Math.random()*120-60

no.style.transform=`translate(${x}px,${y}px)`

i++

if(i<msgs.length){

message.innerText=msgs[i]

}

yes.style.transform=`scale(${1+i*0.15})`

}

no.addEventListener("touchstart",moveNo)

no.addEventListener("mouseover",moveNo)

/* yes click */

yes.addEventListener("click",()=>{

celebrate.style.display="block"

createHearts()

})

/* hearts animation */

function createHearts(){

setInterval(()=>{

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=(20+Math.random()*20)+"px"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},6000)

},300)

}

/* bubbles */

for(let i=0;i<20;i++){

const bubble=document.createElement("div")

bubble.classList.add("bubble")

bubble.style.width=(20+Math.random()*50)+"px"

bubble.style.height=bubble.style.width

bubble.style.left=Math.random()*100+"%"

bubble.style.animationDuration=(10+Math.random()*10)+"s"

document.body.appendChild(bubble)

}

</script>

</body>
</html>
