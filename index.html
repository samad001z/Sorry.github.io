<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💗</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6f0,#ffc2d1);
overflow:hidden;
}

/* floating bubbles */

.bubble{
position:absolute;
bottom:-100px;
border-radius:50%;
background:rgba(255,255,255,0.3);
animation:float 15s infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* glass card */

.card{
position:relative;
padding:50px;
width:340px;
text-align:center;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(20px);
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
}

/* title */

h1{
font-size:32px;
color:white;
margin-bottom:10px;
}

p{
color:white;
font-size:18px;
margin-bottom:30px;
min-height:60px;
}

/* buttons */

.buttons{
position:relative;
height:80px;
}

button{
position:absolute;
padding:12px 25px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

#yes{
left:20%;
background:#ff3d8b;
color:white;
}

#no{
right:20%;
background:white;
}

#yes:hover{
transform:scale(1.15);
}

/* celebration */

.celebration{
display:none;
font-size:26px;
color:white;
margin-top:20px;
animation:fade 1s ease;
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

/* hearts */

.heart{
position:absolute;
font-size:20px;
animation:rise 5s linear infinite;
}

@keyframes rise{
from{transform:translateY(0)}
to{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div class="card">

<h1>I'm Sorry 🥺</h1>

<p id="message">
I know I messed up... please forgive me?
</p>

<div class="buttons">

<button id="yes">Forgive 💗</button>
<button id="no">No 😤</button>

</div>

<div class="celebration" id="celebrate">
Yayyy!! Thank you for forgiving me 💕
</div>

</div>

<script>

/* messages */

const msgs = [
"I know I messed up... please forgive me? 🥺",
"I promise I will do better ❤️",
"You are too important to lose 💔",
"Can we restart and smile again? 😊",
"Please forgive me, my favorite person 💕",
"Last chance? Pretty please 🥹"
]

let i=0

const message = document.getElementById("message")
const no = document.getElementById("no")
const yes = document.getElementById("yes")
const celebrate = document.getElementById("celebrate")

/* no button escape */

no.addEventListener("mouseover",()=>{
const x = Math.random()*200 - 100
const y = Math.random()*200 - 100
no.style.transform = `translate(${x}px,${y}px)`

i++
if(i < msgs.length){
message.innerText = msgs[i]
}

yes.style.transform = `scale(${1 + i*0.15})`
})

/* yes click */

yes.addEventListener("click",()=>{

celebrate.style.display="block"

createHearts()

})

/* hearts */

function createHearts(){

setInterval(()=>{

const heart=document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

},200)

}

/* floating bubbles */

for(let i=0;i<25;i++){

const bubble=document.createElement("div")

bubble.classList.add("bubble")

bubble.style.width=(20+Math.random()*60)+"px"
bubble.style.height=bubble.style.width
bubble.style.left=Math.random()*100+"%"
bubble.style.animationDuration=(8+Math.random()*10)+"s"

document.body.appendChild(bubble)

}

</script>

</body>
</html>
