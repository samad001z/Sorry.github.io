<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I'm Sorry ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8fc7,#ffd6e7,#ffc6ff);
overflow:hidden;
}

/* floating hearts background */

.bg-hearts span{

position:absolute;

color:#ff6fa5;

font-size:20px;

animation:float 12s linear infinite;

opacity:0.6;

}

@keyframes float{

0%{transform:translateY(100vh)}

100%{transform:translateY(-20vh)}

}

/* card */

.card{

width:90%;

max-width:420px;

padding:45px;

border-radius:25px;

text-align:center;

background:rgba(255,255,255,0.2);

backdrop-filter:blur(25px);

box-shadow:0 20px 50px rgba(0,0,0,0.15);

animation:fade 1.2s ease;

}

@keyframes fade{

from{opacity:0; transform:translateY(20px)}

to{opacity:1; transform:translateY(0)}

}

/* title */

h1{

color:white;

font-size:34px;

margin-bottom:10px;

}

/* message */

#message{

color:white;

font-size:18px;

min-height:70px;

margin-bottom:30px;

transition:0.3s;

}

/* buttons */

.buttons{

position:relative;

height:90px;

}

/* yes button */

#yes{

position:absolute;

left:15%;

padding:14px 28px;

border:none;

border-radius:14px;

background:#ff3d8b;

color:white;

font-size:17px;

cursor:pointer;

transition:0.3s;

box-shadow:0 10px 20px rgba(255,61,139,0.4);

}

/* no button */

#no{

position:absolute;

right:15%;

padding:14px 28px;

border:none;

border-radius:14px;

background:white;

font-size:17px;

cursor:pointer;

transition:0.2s;

}

/* celebration */

#celebration{

display:none;

margin-top:25px;

font-size:24px;

color:white;

animation:pop 1s ease;

}

@keyframes pop{

from{transform:scale(0.7);opacity:0}

to{transform:scale(1);opacity:1}

}

/* responsive */

@media(max-width:480px){

.card{

padding:35px;

}

h1{

font-size:28px;

}

#message{

font-size:16px;

}

button{

font-size:15px;

}

}

</style>
</head>

<body>

<div class="bg-hearts" id="bg"></div>

<div class="card">

<h1>I'm Sorry 🥺</h1>

<p id="message">I know I messed up… please forgive me?</p>

<div class="buttons">

<button id="yes">Forgive Me 💗</button>

<button id="no">No 😤</button>

</div>

<div id="celebration">

Yayyy!! Thank you for forgiving me 💕  
You mean the world to me.

</div>

</div>

<script>

/* apology messages */

const messages=[

"I know I messed up… please forgive me 🥺",

"I promise I'll do better ❤️",

"You are too important to lose 💔",

"I hate seeing you upset 😞",

"Can we start again with a smile? 😊",

"Please forgive me, my favorite person 💕",

"I'll make it up to you I promise 🌸"

]

let index=0

const message=document.getElementById("message")

setInterval(()=>{

index=(index+1)%messages.length

message.innerText=messages[index]

},3000)

/* buttons */

const no=document.getElementById("no")

const yes=document.getElementById("yes")

const celebration=document.getElementById("celebration")

let grow=1

function moveNo(){

const x=Math.random()*200-100

const y=Math.random()*120-60

no.style.transform=`translate(${x}px,${y}px)`

grow+=0.15

yes.style.transform=`scale(${grow})`

}

no.addEventListener("mouseover",moveNo)

no.addEventListener("touchstart",moveNo)

/* yes click */

yes.addEventListener("click",()=>{

celebration.style.display="block"

createHearts()

})

/* hearts animation */

function createHearts(){

setInterval(()=>{

const heart=document.createElement("span")

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"%"

heart.style.fontSize=(20+Math.random()*30)+"px"

document.body.appendChild(heart)

setTimeout(()=>{

heart.remove()

},10000)

},200)

}

/* background hearts */

const bg=document.getElementById("bg")

for(let i=0;i<25;i++){

const heart=document.createElement("span")

heart.innerHTML="💗"

heart.style.left=Math.random()*100+"%"

heart.style.animationDuration=(8+Math.random()*10)+"s"

heart.style.fontSize=(14+Math.random()*20)+"px"

bg.appendChild(heart)

}

</script>

</body>
</html>
